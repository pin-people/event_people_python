spec_version: "1.0.0"
implementation_version: "0.1.0"
language: python
package: "event_people (PyPI)"
status: stable

# Components fully implemented (with deviations/bugs noted separately)
implemented:
  - Config
  - Event
  - Listener
  - Emitter
  - Daemon
  - BaseListener
  - ListenersManager
  - BaseBroker
  - RabbitBroker
  - RabbitContext
  - Topic
  - Queue

# Spec components not yet implemented (pending in spec too)
pending:
  - RetryManager
  - "Event.retryCount"
  - "Event.incrementRetryCount"
  - "Config.maxAttempts"
  - "Config.delayStrategy"
  - "Config.dlqName"
  - "Config.getRetryConfig"
  - "Listener.on (retry params: maxAttempts, delayStrategy, dlqName)"
  - "Context.maxRetries"
  - "Context.isLastRetry"
  - "RabbitContext.maxRetries"
  - "RabbitContext.isLastRetry"
  - "RabbitContext.dlqName"
  - "Config.fullUrl (built per-request in RabbitBroker._full_url instead)"

# Structural or naming departures from the spec
deviations:
  - id: DEV-PY-001
    component: Queue
    file: "event_people/broker/rabbit/queue.py"
    severity: high
    description: >
      _queue_name() normalizes the destination segment to 'all', producing queue names
      ending in .all (e.g. {appName}-resource.origin.action.all).
      Spec v2.0.0 requires the destination segment to be the consuming service's appName:
      {appName}-resource.origin.action.{appName}.
    fix: >
      Replace the normalization to 'all' with normalization to APP_NAME.
      Both routing keys (.all and .{appName}) must resolve to the same queue name.
